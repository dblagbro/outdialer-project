[general]
static=yes
writeprotect=no
clearglobalvars=no

[birthday-rsvp]
exten => s,1,NoOp(Out Caller call for ${CONTACT_ID})
 same => n,Answer()
 same => n,Wait(0.2)
 same => n,Set(AGISIGHUP=no)
 same => n,AGI(rsvp_agi.py)
 same => n,Hangup()

[from-avaya]
exten => 5555,1,NoOp(Inbound Avaya test call to Devin's Out Caller)
 same => n,Set(CAMPAIGN_ID=default)
 same => n,Set(CONTACT_ID=inbound-test)
 same => n,Set(ATTEMPT_ID=)
 same => n,Set(CONTACT_NAME=there)
 same => n,Goto(birthday-rsvp,s,1)
